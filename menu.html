<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Harry's Pub — Food Menu</title>
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-left">
      <img src="assets/logo.png" alt="Harry's Pub logo" class="logo" />
      <span class="pub-name" data-i18n="pub.name">Harry's Pub</span>
    </div>

    <div class="header-right">
      <button class="lang-switch" data-lang-switch>
        <span data-lang-label>EN</span>
      </button>
    </div>
  </header>

  <main class="home-main">
    <section class="hero">
      <h1 class="hero-title" data-i18n="menu.title">Food Menu</h1>
      <p class="hero-subtitle" data-i18n="menu.subtitle">
        Menu will be available here.
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <p class="footer-text">
      <span data-i18n="footer.copy">© Harry's Pub. All rights reserved.</span>
    </p>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/welcome.js"></script>
  <script src="js/maps-popup.js"></script>
  <script src="js/language-switch.js"></script>
</body>
</html>
